function exportToExcel() {
  let csv = "Date,Time,Subject,Teachers,Type,Batch,Topic,Remarks,Present Count,Absent Count,Present Rolls,Absent Rolls\n";
  getAllAttendanceRecords().forEach(r => {
    const students = getStudentsForBatch(r.batch);
    const absentRolls = students.filter(s => !r.present.includes(s.roll)).map(s => s.roll);
    const escapeCsv = (str) => `"${String(str || '').replace(/"/g, '""')}"`;
    csv += [
      escapeCsv(r.date), escapeCsv(r.time), escapeCsv(r.subjectName), escapeCsv(getTeachersFromRecord(r).join(', ')),
      escapeCsv(r.type), escapeCsv(r.batch), escapeCsv(r.topic), escapeCsv(r.remarks),
      r.present.length, absentRolls.length,
      escapeCsv(r.present.join(', ')), escapeCsv(absentRolls.join(', '))
    ].join(',') + "\n";
  });
  
  const blob = new Blob(["\uFEFF" + csv], {type: 'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'attendance_report_' + formatDateISO(new Date()) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ Excel CSV exported', 'success');
}


function exportJSON() {
  const data = JSON.stringify(DB, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'cr_attendance_backup_' + formatDateISO(new Date()) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ Backup exported', 'success');
}


function importJSON() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.students && data.subjects) {
          DB = data;
          if (!DB.recycleBin) DB.recycleBin = [];
          saveDB();
          showToast('✓ Backup imported', 'success');
          renderSetup();
        } else {
          showToast('Invalid file format', 'error');
        }
      } catch(err) {
        showToast('Import failed', 'error');
      }
    };
    reader.readAsText(file);
  });
  input.click();
}


function showRecycleBin() {
  const modal = document.getElementById('modal-content');
  modal.innerHTML = `
    <div class="modal-header">
      <h2>♻️ Recycle Bin</h2>
      <button class="modal-close" id="modal-close-btn">✕</button>
    </div>
    ${DB.recycleBin.length === 0 ? '<div class="empty-state"><div class="es-icon">🗑️</div><div class="es-msg">Recycle Bin is empty</div></div>' : 
      DB.recycleBin.map(r => `
        <div class="setup-item">
          <div class="si-info">
            <div class="si-title">${r.subjectName} - ${r.time}</div>
            <div class="si-sub">Date: ${r.date.split('-').reverse().join('/')} | Batch: ${r.batch}</div>
          </div>
          <div class="si-actions">
            <button class="recycle-restore" data-id="${r.id}" style="color: var(--green); font-weight:700">Restore</button>
            <button class="recycle-delete" data-id="${r.id}" style="color: var(--red); font-weight:700">Delete</button>
          </div>
        </div>
      `).join('')
    }
  `;
  document.getElementById('modal-overlay').classList.add('active');
  
  modal.querySelectorAll('.recycle-restore').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const idx = DB.recycleBin.findIndex(r => r.id === id);
      if (idx > -1) {
        const [restored] = DB.recycleBin.splice(idx, 1);
        if (!DB.attendance[restored.date]) DB.attendance[restored.date] = [];
        restored.modifiedAt = Date.now();
        restored.history.push({ ts: Date.now(), action: 'Restored from Recycle Bin' });
        DB.attendance[restored.date].push(restored);
        saveDB();
        showToast('✓ Record restored', 'success');
        showRecycleBin();
      }
    });
  });
  
  modal.querySelectorAll('.recycle-delete').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      DB.recycleBin = DB.recycleBin.filter(r => r.id !== id);
      saveDB();
      showToast('Permanently deleted', 'success');
      showRecycleBin();
      renderSettingsSetup();
    });
  });
  
  document.getElementById('modal-close-btn').addEventListener('click', closeModal);
}


// ============================================================
// PDF EXPORT (Print-based)
// ============================================================
function exportPDF() {
  const stats = computeStats();
  const printArea = document.getElementById('print-area');


  const studentRows = [...DB.students].sort((a,b) => a.roll - b.roll).map(s => {
    const st = stats.studentStats[s.roll] || {present:0, total:0, percentage:0};
    return `<tr>
      <td>${s.roll}</td><td>${s.name}</td><td>${s.batch || 'None'}</td>
      <td>${st.present}</td><td>${st.total - st.present}</td><td>${st.total}</td>
      <td style="font-weight:bold;color:${st.percentage>=75?'#16a34a':'#dc2626'}">${st.percentage.toFixed(1)}%</td>
    </tr>`;
  }).join('');


  const subjectRows = DB.subjects.map(sub => {
    const st = stats.subjectStats[sub.id] || {present:0, total:0, percentage:0, count:0};
    return `<tr>
      <td>${sub.name}</td><td>${st.count}</td><td>${st.present}</td><td>${st.total}</td>
      <td>${st.percentage.toFixed(1)}%</td>
    </tr>`;
  }).join('');


  const recentRecords = stats.allRecords.slice(-20).reverse();
  const historyRows = recentRecords.map(r => {
    const students = getStudentsForBatch(r.batch);
    const absentCount = students.length - r.present.length;
    return `<tr>
      <td>${r.date.split('-').reverse().join('/')}</td>
      <td>${r.subjectName}</td><td>${getTeachersFromRecord(r).join(', ')}</td><td>${r.type}</td>
      <td>${r.batch}</td><td>${r.present.length}</td><td>${absentCount}</td>
      <td>${r.time}</td><td>${r.topic || ''}</td>
    </tr>`;
  }).join('');


  printArea.innerHTML = `
    <div class="print-page">
      <div class="print-h1">${DB.settings.className} — Attendance Report</div>
      <div style="font-size:12px;color:#666;margin-bottom:16px">Generated: ${formatDate(new Date())} | Total Lectures: ${stats.totalRecords} | Class Average: ${stats.classAvg.toFixed(1)}%</div>


      <div class="print-h2">Page 1: Student Summary</div>
      <table class="print-table">
        <thead><tr><th>Roll</th><th>Name</th><th>Batch</th><th>Present</th><th>Absent</th><th>Total</th><th>%</th></tr></thead>
        <tbody>${studentRows}</tbody>
      </table>
    </div>


    <div class="print-page">
      <div class="print-h2">Page 2: Subject Analysis</div>
      <table class="print-table">
        <thead><tr><th>Subject</th><th>Lectures</th><th>Present</th><th>Total</th><th>Attendance</th></tr></thead>
        <tbody>${subjectRows}</tbody>
      </table>
      <div class="print-h2" style="margin-top:20px">Batch Comparison</div>
      <table class="print-table">
        <thead><tr><th>Batch</th><th>Present</th><th>Total</th><th>%</th></tr></thead>
        <tbody>
          <tr><td>Batch A</td><td>${stats.batchStats.A?.present||0}</td><td>${stats.batchStats.A?.total||0}</td><td>${(stats.batchStats.A?.percentage||0).toFixed(1)}%</td></tr>
          <tr><td>Batch B</td><td>${stats.batchStats.B?.present||0}</td><td>${stats.batchStats.B?.total||0}</td><td>${(stats.batchStats.B?.percentage||0).toFixed(1)}%</td></tr>
        </tbody>
      </table>
    </div>


    <div class="print-page">
      <div class="print-h2">Page 3: Visual Summary</div>
      <div class="print-h2">Subject-wise Attendance</div>
      ${DB.subjects.map(sub => {
        const st = stats.subjectStats[sub.id] || {percentage:0, count:0};
        return `<div style="margin:4px 0;font-size:12px">
          <span style="display:inline-block;width:120px">${sub.name}</span>
          <div class="print-bar" style="width:${st.percentage*2}px;background:${st.percentage>=75?'#16a34a':'#dc2626'};height:12px"></div>
          <span style="margin-left:4px">${st.percentage.toFixed(1)}%</span>
        </div>`;
      }).join('')}
      <div class="print-h2" style="margin-top:20px">Attendance Distribution</div>
      <div style="font-size:12px">
        <p>Above 75%: ${Object.values(stats.studentStats).filter(s=>s.percentage>=75).length} students</p>
        <p>50%-75%: ${Object.values(stats.studentStats).filter(s=>s.percentage>=50&&s.percentage<75).length} students</p>
        <p>Below 50%: ${Object.values(stats.studentStats).filter(s=>s.percentage<50&&s.percentage>0).length} students</p>
      </div>
    </div>


    <div class="print-page">
      <div class="print-h2">Page 4: Recent Attendance History</div>
      <table class="print-table">
        <thead><tr><th>Date</th><th>Subject</th><th>Teachers</th><th>Type</th><th>Batch</th><th>Present</th><th>Absent</th><th>Time</th><th>Topic</th></tr></thead>
        <tbody>${historyRows}</tbody>
      </table>
    </div>
  `;


  window.print();
}


// ============================================================
// TOPIC AUTOCOMPLETE
// ============================================================
function setupTopicAutocomplete() {
  const input = document.getElementById('att-topic');
  const suggestions = document.getElementById('topic-suggestions');


  input.addEventListener('input', debounce(() => {
    const query = input.value.toLowerCase().trim();
    if (!query) {
      suggestions.style.display = 'none';
      return;
    }
    const matches = DB.topics.filter(t => t.toLowerCase().includes(query)).slice(0, 5);
    if (matches.length > 0) {
      suggestions.innerHTML = matches.map(t =>
        `<div class="sug" data-topic="${t}">${t}</div>`
      ).join('');
      suggestions.style.display = 'block';
    } else {
      suggestions.style.display = 'none';
    }
  }, 200));


  input.addEventListener('blur', () => {
    setTimeout(() => { suggestions.style.display = 'none'; }, 200);
  });


  suggestions.addEventListener('click', (e) => {
    if (e.target.classList.contains('sug')) {
      input.value = e.target.dataset.topic;
      AppState.attendance.topic = e.target.dataset.topic;
      suggestions.style.display = 'none';
      saveCurrentAttendance(true);
    }
  });


  input.addEventListener('input', () => {
    AppState.attendance.topic = input.value;
    silentSave();
  });
}


// ============================================================
// EVENT LISTENERS
// ============================================================
function setupEventListeners() {
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => navigate(btn.dataset.nav));
  });


  document.getElementById('theme-toggle').addEventListener('click', () => {
    const current = document.documentElement.dataset.theme;
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.dataset.theme = next;
    DB.settings.theme = next;
    saveDB(true);
    document.getElementById('theme-icon').innerHTML = next === 'dark' ? 
      '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>' : 
      '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
    document.querySelector('meta[name="theme-color"]').setAttribute('content', next === 'dark' ? '#0f172a' : '#4f46e5');
  });


  document.getElementById('att-date').addEventListener('change', (e) => {
    saveCurrentAttendance(true); 
    AppState.attendance.date = e.target.value;
    AppState.attendance.recordId = null;
    clearAttendanceForm();
    renderExistingRecords();
  });


  document.getElementById('new-record-btn').addEventListener('click', () => {
    clearAttendanceForm();
    showToast('Ready for new record', 'success');
  });


  document.getElementById('att-subject').addEventListener('change', (e) => {
    AppState.attendance.subjectId = e.target.value;
    AppState.attendance.subjectName = getSubjectName(e.target.value);
    const teachers = getTeachersForSubject(e.target.value);
    
    const hasOverlap = AppState.attendance.teachers.some(t => teachers.includes(t));
    if (!hasOverlap && teachers.length > 0) {
      AppState.attendance.teachers = [teachers[0]];
    } else if (!hasOverlap && teachers.length === 0) {
      AppState.attendance.teachers = [];
    }
    
    renderTeacherChips();
    saveCurrentAttendance(true);
  });


  document.getElementById('att-batch').addEventListener('change', (e) => {
    AppState.attendance.batch = e.target.value;
    const validRolls = getStudentsForBatch(e.target.value).map(s => s.roll);
    AppState.attendance.present = AppState.attendance.present.filter(r => validRolls.includes(r));
    renderStudents();
    updateCounts();
    saveCurrentAttendance(true);
  });


  document.getElementById('att-type').addEventListener('change', (e) => {
    AppState.attendance.type = e.target.value;
    saveCurrentAttendance(true);
  });


  document.getElementById('att-time').addEventListener('input', (e) => {
    AppState.attendance.time = e.target.value;
    saveCurrentAttendance(true);
  });


  document.getElementById('att-remarks').addEventListener('input', (e) => {
    AppState.attendance.remarks = e.target.value;
    silentSave();
  });


  document.querySelectorAll('.mode-toggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      const mode = btn.dataset.mode;
      if (mode === AppState.attendance.mode) return;
      AppState.attendance.mode = mode;
      document.querySelectorAll('.mode-toggle button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderStudents();
    });
  });


  const container = document.getElementById('student-container');
  container.addEventListener('click', (e) => {
    const item = e.target.closest('.att-item');
    if (item && container.contains(item)) {
      togglePresent(item.dataset.roll);
    }
  });


  const searchInput = document.getElementById('att-search');
  searchInput.addEventListener('input', debounce(() => {
    const query = searchInput.value.toLowerCase().trim();
    container.querySelectorAll('.att-item').forEach(item => {
      const searchData = item.dataset.search;
      if (!query || searchData.includes(query)) {
        item.style.display = '';
      } else {
        item.style.display = 'none';
      }
    });
  }, 150));


  document.getElementById('mark-all-btn').addEventListener('click', markAllPresent);
  document.getElementById('reset-btn').addEventListener('click', resetAttendance);
  document.getElementById('copy-btn').addEventListener('click', showCopyModal);
  document.getElementById('delete-record-btn').addEventListener('click', deleteCurrentRecord);


  document.querySelectorAll('.report-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.report-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.report-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('report-' + tab.dataset.report).classList.add('active');
    });
  });


  document.querySelectorAll('.setup-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.setup-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.setup-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('setup-' + tab.dataset.setup).classList.add('active');
      AppState.setupTab = tab.dataset.setup;
      renderSetup();
    });
  });


  document.getElementById('export-pdf-btn').addEventListener('click', exportPDF);


  document.getElementById('modal-overlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });


  setupTopicAutocomplete();
}


// ============================================================
// APP INITIALIZATION
// ============================================================
function init() {
  loadDB();


  document.documentElement.dataset.theme = DB.settings.theme;
  document.getElementById('theme-icon').innerHTML = DB.settings.theme === 'dark' ? 
    '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>' : 
    '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
  document.querySelector('meta[name="theme-color"]').setAttribute('content', DB.settings.theme === 'dark' ? '#0f172a' : '#4f46e5');


  AppState.attendance.mode = DB.settings.defaultView || 'list';


  const now = new Date();
  AppState.currentDate = now;
  AppState.attendance.date = formatDateISO(now);


  setupEventListeners();
  renderHome();


  if (!sessionStorage.getItem('welcome_shown')) {
    setTimeout(() => showToast('Welcome! Add students and start taking attendance.', 'success'), 500);
    sessionStorage.setItem('welcome_shown', '1');
  }


  setInterval(() => {
    if (AppState.currentView === 'home') {
      const now = new Date();
      if (now.getMinutes() === 0 || now.getMinutes() === 30) {
        AppState.currentDate = now;
        renderHome();
      }
    }
  }, 60000);
}


if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
